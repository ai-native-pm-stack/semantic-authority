# Semantic Authority — Hotel Booking Service
# This is a worked example. See GUIDE.md for how to write your own.

system: hotel-booking-service
version: 1.0.0
status: active
owner: platform-team
last_reviewed: 2026-03-09

goal:
  primary: >
    Enable B2B clients to offer hotel search with composable perks
    to their premium members through API or embedded UI.
  success_criteria:
    - "B2B client can onboard, configure pricing, and search hotels within 1 hour"
    - "Hotel search returns results with matched perks in under 2 seconds"
    - "Booking flow completes end-to-end: search, select, pay, confirm"
  non_goals:
    - "Does not handle payment processing directly — delegates to Stripe"
    - "Does not support B2C direct consumer signups in v1"
    - "Does not provide flight search or booking"
    - "Does not manage loyalty points or frequent flyer programs"
    - "Does not support offline or call-center booking flows"
    - "Does not provide travel insurance"
    - "Does not support multi-currency pricing in v1 — all prices in USD"

constraints:
  - id: C-FIN-PAYMENT-CONFIRMED-001
    description: "Booking must never be marked confirmed without a verified payment webhook from Stripe"
    category: business
    enforcement: block
    owner: payments-team
    rationale: "Financial and legal exposure if bookings confirm without payment"
    source: declared
    confidence: high
    verification_notes: "Integration test: booking status remains 'pending' until webhook received"

  - id: C-SEC-NO-CARD-STORAGE-002
    description: "System must never store raw credit card data including CVV in any database or cache"
    category: security
    enforcement: block
    owner: security
    rationale: "PCI-DSS compliance requirement"
    source: declared
    confidence: high
    verification_notes: "Code scan for card number patterns; grep for CVV/card_number in schema"

  - id: C-SEC-ORG-ISOLATION-003
    description: "Organization A must never see data belonging to Organization B — all queries must be org-scoped"
    category: security
    enforcement: block
    owner: platform-team
    rationale: "Multi-tenant data leakage is a trust-destroying breach"
    source: declared
    confidence: high
    verification_notes: "Integration tests with two orgs verifying zero cross-org visibility"

  - id: C-PERF-SEARCH-P95-004
    description: "Hotel search P95 latency must remain under 2000ms"
    category: operational
    enforcement: warn
    owner: platform-team
    rationale: "User experience threshold for search responsiveness"
    source: declared
    confidence: medium
    verification_notes: "Load test with 50 concurrent searches across 5 orgs"

  - id: C-ARCH-NO-DIRECT-DB-005
    description: "Frontend clients must never access the database directly — all access through API"
    category: architectural
    enforcement: block
    owner: platform-team
    rationale: "API layer enforces auth, validation, and org-scoping"
    source: declared
    confidence: high

  - id: C-FIN-PERK-INVENTORY-006
    description: "Perk inventory count must never go negative"
    category: data
    enforcement: block
    owner: platform-team
    rationale: "Negative inventory causes downstream booking failures and over-redemption"
    source: declared
    confidence: high
    verification_notes: "PostgreSQL CHECK constraint + atomic decrement with WHERE quantity > 0"

trade_offs:
  chosen:
    approach: "Eventual consistency for perk inventory counts at search time"
    rationale: "Reduces booking latency; exact counts not needed when displaying search results"
  rejected:
    - alternative: "Strong consistency with distributed locks"
      reason: "200ms latency overhead per search result unacceptable at scale"
      revisit_condition: "If perk overselling exceeds 2% of total redemptions"
    - alternative: "Client-side inventory caching"
      reason: "Stale counts create worse UX than eventual consistency"
      revisit_condition: "If search latency exceeds P95 budget"
  known_risks:
    - risk: "Eventual consistency may allow brief over-selling of popular perks"
      mitigation: "Atomic decrement at redemption time is the source of truth; search counts are advisory"

interfaces:
  consumes:
    - "Stripe API (payment processing)"
    - "Kiwi Collection API (hotel inventory)"
    - "Emerging Travel API (hotel inventory)"
    - "Viator API (experiences)"
  provides:
    - "REST API for B2B clients (hotel search, booking, perks, org management)"
    - "Embeddable widget SDK (JavaScript)"

evolution:
  current_focus: "B2B platform core — org onboarding, hotel search with perks, booking flow"
  future_considerations:
    - "AI travel assistant (Phase 2)"
    - "Group travel / Circles (Phase 2)"
    - "Multi-currency pricing support"
  deprecations:
    - "Legacy PHP booking engine (archived, not maintained)"

drift_policy:
  review_cadence: monthly
  enforcement_rules:
    block: "Violation must not merge without remediation or an approved drift record with expiry"
    warn: "Acknowledgement required with owner and revisit date"
    observe: "Logged for trend analysis; reviewed monthly"
  drift_record_fields:
    - drift_id
    - constraint_id
    - observed_divergence
    - impact_assessment
    - decision
    - owner
    - date
    - expiry

provenance:
  source_summary: "Derived from VanityPass Executive Brief & Readiness Report and Product Solution Recommendation"
  assumptions:
    - "Stripe is the sole payment processor for v1"
    - "All B2B clients operate in USD for v1"
  clarifications_needed:
    - "Maximum number of concurrent orgs the system should support"
    - "SLA requirements for B2B clients"
