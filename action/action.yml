name: "Semantic Authority Meaning Gate"
description: "Validate MEANING.yaml and enforce semantic constraints on pull requests via an LLM judge"
author: "Samson Aligba"

branding:
  icon: "shield"
  color: "blue"

inputs:
  mode:
    description: "What to run: 'validate' (schema only), 'review' (LLM-judged constraint risk), or 'both'"
    required: false
    default: "validate"
  validate:
    description: "[deprecated] Use mode=validate. Run schema validation on MEANING.yaml"
    required: false
    default: "true"
  gate:
    description: "[deprecated] Use mode=review and fail-on=block. Block merge on block-level constraint violations"
    required: false
    default: "false"
  strict:
    description: "Treat warnings as errors during validation"
    required: false
    default: "false"
  meaning-file:
    description: "Path to MEANING.yaml"
    required: false
    default: "./MEANING.yaml"
  base:
    description: "Base ref for review mode (defaults to PR base or 'main')"
    required: false
    default: ""
  fail-on:
    description: "Severity threshold for review mode: block | warn | observe"
    required: false
    default: "block"
  provider:
    description: "Judge provider: anthropic | openai"
    required: false
    default: "anthropic"
  model:
    description: "Model id for the review judge"
    required: false
    default: "claude-opus-4-7"
  budget-usd:
    description: "Per-run cost cap for the review judge"
    required: false
    default: "1.00"
  upload-sarif:
    description: "Upload SARIF results to GitHub code scanning"
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"

    - name: Build Semantic Authority CLI from this repo
      shell: bash
      run: |
        CLI_DIR="${{ github.action_path }}/../packages/cli"
        npm ci --prefix "$CLI_DIR"
        npm run build --prefix "$CLI_DIR"

    - name: Validate MEANING.yaml
      if: inputs.mode == 'validate' || inputs.mode == 'both' || (inputs.mode == '' && inputs.validate == 'true')
      shell: bash
      run: |
        CLI_ENTRY="${{ github.action_path }}/../packages/cli/dist/index.js"
        if [ "${{ inputs.strict }}" = "true" ]; then
          node "$CLI_ENTRY" validate --file "${{ inputs.meaning-file }}" --strict
        else
          node "$CLI_ENTRY" validate --file "${{ inputs.meaning-file }}"
        fi

    - name: Run meaning review
      id: review
      if: inputs.mode == 'review' || inputs.mode == 'both'
      shell: bash
      run: |
        BASE="${{ inputs.base }}"
        if [ -z "$BASE" ]; then
          BASE="${GITHUB_BASE_REF:-main}"
        fi
        git fetch origin "$BASE" --depth=50 || true
        echo "## Meaning Review" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY

        REVIEW_ARGS=(
          node "${{ github.action_path }}/../packages/cli/dist/index.js" review
          --provider "${{ inputs.provider }}"
          --meaning "${{ inputs.meaning-file }}"
          --base "origin/$BASE"
          --model "${{ inputs.model }}"
          --budget-usd "${{ inputs.budget-usd }}"
          --fail-on "${{ inputs.fail-on }}"
          --format text
          --no-color
        )

        if [ "${{ inputs.upload-sarif }}" = "true" ]; then
          REVIEW_ARGS+=(--sarif-output meaning-review.sarif)
        fi

        set +e
        "${REVIEW_ARGS[@]}" | tee -a $GITHUB_STEP_SUMMARY
        REVIEW_EXIT=${PIPESTATUS[0]}
        echo '```' >> $GITHUB_STEP_SUMMARY
        echo "exit_code=$REVIEW_EXIT" >> "$GITHUB_OUTPUT"
        exit 0

    - name: Upload SARIF
      if: always() && (inputs.mode == 'review' || inputs.mode == 'both') && inputs.upload-sarif == 'true'
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: meaning-review.sarif
      continue-on-error: true

    - name: Enforce meaning review outcome
      if: always() && (inputs.mode == 'review' || inputs.mode == 'both')
      shell: bash
      run: |
        REVIEW_EXIT="${{ steps.review.outputs.exit_code }}"
        if [ -z "$REVIEW_EXIT" ]; then
          REVIEW_EXIT=2
        fi
        exit "$REVIEW_EXIT"
