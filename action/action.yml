name: "Semantic Authority Meaning Gate"
description: "Validate MEANING.yaml and enforce constraints on pull requests"
author: "Samson Aligba"

branding:
  icon: "shield"
  color: "blue"

inputs:
  validate:
    description: "Run schema validation on MEANING.yaml"
    required: false
    default: "true"
  gate:
    description: "Block merge on block-level constraint violations"
    required: false
    default: "false"
  strict:
    description: "Treat warnings as errors during validation"
    required: false
    default: "false"
  meaning-file:
    description: "Path to MEANING.yaml"
    required: false
    default: "./MEANING.yaml"

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"

    - name: Install Semantic Authority CLI
      shell: bash
      run: npm install -g @semantic-authority/cli

    - name: Validate MEANING.yaml
      if: inputs.validate == 'true'
      shell: bash
      run: |
        if [ "${{ inputs.strict }}" = "true" ]; then
          meaning validate --file "${{ inputs.meaning-file }}" --strict
        else
          meaning validate --file "${{ inputs.meaning-file }}"
        fi

    - name: Generate drift report
      if: inputs.gate == 'true'
      shell: bash
      run: |
        echo "## Meaning Gate Report" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        meaning validate --file "${{ inputs.meaning-file }}" 2>&1 | tee -a $GITHUB_STEP_SUMMARY || true
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "_Generated by [Semantic Authority](https://github.com/ai-native-pm-stack/semantic-authority)_" >> $GITHUB_STEP_SUMMARY
